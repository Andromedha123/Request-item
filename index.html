<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Request Menu</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

</head>

<body class="bg-gray-100 font-sans">

<div class="flex min-h-screen">

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">

<h1 class="logo">MBG System</h1>

<ul>

<li onclick="showCategory('protein')" class="menu">🥩 Protein</li>
<li onclick="showCategory('karbo')" class="menu">🍚 Karbohidrat</li>
<li onclick="showCategory('buah')" class="menu">🍎 Buah</li>
<li onclick="showCategory('sayur')" class="menu">🥬 Sayur</li>

</ul>

</div>

<!-- CONTENT -->
<div class="flex-1 p-4 md:p-8">

<!-- HEADER -->

<div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-6">

<div class="flex items-center gap-3">

<button onclick="toggleSidebar()" class="text-2xl font-bold md:hidden">
☰
</button>

<h2 id="categoryTitle" class="text-xl md:text-2xl font-bold">
Protein
</h2>

</div>

<input id="search"
placeholder="Cari bahan..."
onkeyup="searchItem()"
class="border p-2 rounded w-full md:w-64">

</div>

<!-- STAT CARDS -->

<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 mb-6">

<div class="bg-white p-4 rounded-xl shadow">
<h4 class="text-gray-500">Total Bahan</h4>
<p id="totalItems" class="text-2xl font-bold">0</p>
</div>

<div class="bg-white p-4 rounded-xl shadow">
<h4 class="text-gray-500">Bahan Dipilih</h4>
<p id="totalCart" class="text-2xl font-bold">0</p>
</div>

<div class="bg-white p-4 rounded-xl shadow">
<h4 class="text-gray-500">Estimasi Biaya</h4>
<p class="text-2xl font-bold">Rp <span id="total">0</span></p>
</div>

</div>

<!-- ITEMS -->

<div id="items"
class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
</div>

<button onclick="addItem()" class="btn-add mt-4">
+ Tambah Bahan
</button>

<hr class="my-8">

<h3 class="text-xl font-bold mb-4">
Bahan Dipilih
</h3>

<div id="cart" class="space-y-3"></div>

<!-- FORM -->

<div class="mt-6 space-y-3">

<input id="email"
placeholder="Email"
class="border p-2 rounded w-full">

<textarea id="remarks"
placeholder="Remarks"
class="border p-2 rounded w-full">
</textarea>

<div class="flex flex-col sm:flex-row gap-3">

<button onclick="submitForm()" class="btn-submit w-full">
Submit
</button>

<button onclick="exportExcel()" class="btn-export w-full">
Export Excel
</button>

</div>

</div>

</div>

</div>

<script src="script.js"></script>

<script>

function toggleSidebar(){

let sidebar=document.getElementById("sidebar")

sidebar.classList.toggle("show")

}

</script>

</body>
</html>
